<html>
<head>
    <title>FPHS Model</title>
    <link rel="shortcut icon" type="image/png" href="favicon.png"/>
    <link rel="stylesheet" href="/tingle-master/dist/tingle.min.css">
    <link rel="stylesheet" href="//code.jquery.com/ui/1.12.1/themes/base/jquery-ui.css">
    <link href='https://fonts.googleapis.com/css?family=Varela+Round' rel='stylesheet' type='text/css'>
    <style type="text/css">
             .ringpart {
                background-repeat: no-repeat;
                background-size: contain;
                position: absolute;
            }

            #mainring {
                background-repeat: no-repeat;
                background-size: contain;
                position: absolute;
                background-image: url(L01,R1,C1,Background,visible,normal,255.png);
                /* we want this element always on bottom */
                z-index: -1000;
            }

            #layer2 {
                background-image: url("L14,R1,C1,Layer 2,hidden,normal,255.png");
            }

            #layer3 {
                background-image: url("L13,R1,C1,Layer 3,hidden,normal,255.png");
            }

            #layer4 {
                background-image: url("L12,R1,C1,Layer 4,hidden,normal,255.png");
            }

            #layer5 {
                background-image: url("L11,R1,C1,Layer 5,hidden,normal,255.png");
            }

            #layer6 {
                background-image: url("L10,R1,C1,Layer 6,hidden,normal,255.png");
            }

            #layer7 {
                background-image: url("L09,R1,C1,Layer 7,hidden,normal,255.png");
            }

            #ring1 {
                background-image: url("L08,R1,C1,Layer 8,hidden,normal,255.png");
            }

            #ring2 {
                background-image: url("L07,R1,C1,Layer 9,hidden,normal,255.png");
            }

            #ring3 {
                background-image: url("L06,R1,C1,Layer 10,hidden,normal,255.png");
            }

            #ring4 {
                background-image: url("L05,R1,C1,Layer 11,hidden,normal,255.png");
            }

            #ring5 {
                background-image: url("L04,R1,C1,Layer 12,hidden,normal,255.png");
            }

            #ring6 {
                background-image: url("L03,R1,C1,Layer 13,hidden,normal,255.png");
            }

            #ring7 {
                background-image: url("L02,R1,C1,Layer 14,hidden,normal,255.png");
            }

            .ringsizer {
                width: 700px;
                height: 700px;
            }

            #coolcontainer {
                left: 0px;
                right: 0px;
                margin: auto;
            }

            #hiddenimage {
                display: none;
            }

            body {
                background-color: #fff;
                overflow: hidden;
            }

            #helpbtn {
                position: absolute;
                right: 10px;
                top: 10px;
                box-shadow:inset 0px -3px 7px 0px #29bbff;
                background:linear-gradient(to bottom, #2dabf9 5%, #0688fa 100%);
                background-color:#2dabf9;
                border-radius:3px;
                border:1px solid #0b0e07;
                display:inline-block;
                cursor:pointer;
                color:#ffffff;
                font-family:Arial;
                text-decoration:none;
                text-shadow:0px 1px 0px #263666;
                padding: 5px 15px;
            }

            #helpbtn:hover {
                background:linear-gradient(to bottom, #0688fa 5%, #2dabf9 100%);
                background-color:#0688fa;
            }

            .modalFont {
                font-family: Calibri; 
            }

            #volumetoggle {
                position: absolute;
                left: 10px;
                bottom: 10px;
                box-shadow:inset 0px -3px 7px 0px #29bbff;
                background:linear-gradient(to bottom, #2dabf9 5%, #0688fa 100%);
                background-color:#2dabf9;
                border-radius:3px;
                border:1px solid #0b0e07;
                display:inline-block;
                cursor:pointer;
                padding: 5px 15px;
                color:#ffffff;
                font-family:Arial;
                text-decoration:none;
                text-shadow:0px 1px 0px #263666;
            }

            #volumecontainer {
                display: none;

                position: absolute;
                left: 10px;
                bottom: 50px;
                padding:9px 26px;
                box-shadow:inset 0px -3px 7px 0px #29bbff;
                background:linear-gradient(to bottom, #2dabf9 5%, #0688fa 100%);
                background-color:#2dabf9;
                border-radius:3px;
                border:1px solid #0b0e07;
                
                cursor:pointer;
                color:#ffffff;
                font-family:Arial;
                font-size:15px;
                text-decoration:none;
                text-shadow:0px 1px 0px #263666;
            }

            #volume-vertical {
                margin-top: 30px;
            }

            #volumespan {
                /*margin:-9px -23px;*/
                text-align: center;
                position: absolute;
            }



        </style>

</head>
<body>
    <div id="coolcontainer" class="ringsizer">
        <img id="hiddenimage" src="L01,R1,C1,Background,visible,normal,255.png" />
        <div id="mainring" class="ringsizer"></div>
        <div id="layer2" class="ringpart ringsizer innerpie" alt="CHRONIC"></div>
        <div id="layer3" class="ringpart ringsizer innerpie" alt="LINKAGE"></div>
        <div id="layer4" class="ringpart ringsizer innerpie" alt="INJURY"></div>
        <div id="layer5" class="ringpart ringsizer innerpie" alt="MATERNAL"></div>
        <div id="layer6" class="ringpart ringsizer innerpie" alt="ENVIRONMENT"></div>
        <div id="layer7" class="ringpart ringsizer innerpie" alt="COMMUNICABLE_DISEASE"></div>
        <div id="ring1" class="ringpart outerring ringsizer" alt="COMMUNICATIONS"></div>
        <div id="ring2" class="ringpart outerring ringsizer" alt="COMMUNITY"></div>
        <div id="ring3" class="ringpart outerring ringsizer" alt="ORGANIZATION"></div>
        <div id="ring4" class="ringpart outerring ringsizer" alt="ACCOUNTABILITY"></div>
        <div id="ring5" class="ringpart outerring ringsizer" alt="ASSESSMENT"></div>
        <div id="ring6" class="ringpart outerring ringsizer" alt="EMERGENCY"></div>
        <div id="ring7" class="ringpart outerring ringsizer" alt="POLICY"></div>
    </div>

    <audio id="audioFile" preload="none" src=""></audio>

    <button id="helpbtn">Help</button>

    <div id="volumecontainer">
        <span id="volumespan" style="border:0; color:#f6931f; font-weight:bold;"></span>
        <div id="volume-vertical" style="height:200px;"></div>
    </div>
    <button id="volumetoggle">&#128266;</button>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.4.1/jquery.min.js" type="text/javascript"></script>
    <script src="//code.jquery.com/ui/1.11.4/jquery-ui.js"></script>
    <script src="/tingle-master/dist/tingle.min.js"></script>
    <script src="main.js"></script>

</body>
</html>
