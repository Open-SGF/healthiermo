name: Build and Publish Docker Image

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string

env:
  REGISTRY: ghcr.io

jobs:
  build:
    name: Build Docker Image (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Sanitize platform for tag
        id: platform
        run: |
          PLATFORM_TAG=$(echo "${{ matrix.platform }}" | tr '/' '-')
          echo "tag=$PLATFORM_TAG" >> "$GITHUB_OUTPUT"

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}
          flavor: |
            suffix=-${{ steps.platform.outputs.tag }},onlatest=false
          tags: |
            type=raw,value=${{ inputs.version }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.platform }}
          platforms: ${{ matrix.platform }}
          provenance: false

  merge:
    name: Create Multi-Arch Manifest
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
      packages: write
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta (final tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}
          tags: |
            type=raw,value=${{ inputs.version }}
            type=raw,value=latest

      - name: Docker meta (amd64 source)
        id: meta-amd64
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}
          flavor: |
            suffix=-linux-amd64,onlatest=false
          tags: |
            type=raw,value=${{ inputs.version }}

      - name: Docker meta (arm64 source)
        id: meta-arm64
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}
          flavor: |
            suffix=-linux-arm64,onlatest=false
          tags: |
            type=raw,value=${{ inputs.version }}

      - name: Create and push multi-arch manifest
        run: |
          FINAL_TAGS=""
          for tag in $(echo '${{ steps.meta.outputs.tags }}' | grep -v '^$'); do
            FINAL_TAGS="$FINAL_TAGS -t $tag"
          done
          docker buildx imagetools create \
            $FINAL_TAGS \
            ${{ steps.meta-amd64.outputs.tags }} \
            ${{ steps.meta-arm64.outputs.tags }}

      - name: Add Docker image info to release
        uses: actions/github-script@v7
        with:
          script: |
            const tag = 'v${{ inputs.version }}';
            const { data: release } = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag: tag
            });

            const owner = context.repo.owner.toLowerCase();
            const repo = context.repo.repo.toLowerCase();
            const imageUrl = `https://github.com/${owner}/${repo}/pkgs/container/${repo}`;
            const dockerSection = `## Docker Image\n\n` +
              `**Published:** ✅\n` +
              `**Image:** \`ghcr.io/${owner}/${repo}:${{ inputs.version }}\`\n` +
              `**Latest:** \`ghcr.io/${owner}/${repo}:latest\`\n\n` +
              `Pull: \`docker pull ghcr.io/${owner}/${repo}:${{ inputs.version }}\`\n\n` +
              `[View on GitHub Container Registry](${imageUrl})`;

            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.id,
              body: release.body + '\n\n---\n\n' + dockerSection
            });
